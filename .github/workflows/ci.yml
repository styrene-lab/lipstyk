name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings

  dogfood:
    name: Self-analysis
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build lipstyk
        run: cargo build --release

      - name: Generate self-report
        run: |
          DATE=$(date -u +%Y-%m-%d)
          ./target/release/lipstyk --report --exclude-tests src/ \
            > dogfood-reports/self-${DATE}.md
          ./target/release/lipstyk --json --exclude-tests src/ \
            > dogfood-reports/self-${DATE}.json
          cat dogfood-reports/self-${DATE}.md >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Self-scan threshold gate
        run: ./target/release/lipstyk --exclude-tests --threshold 60 src/

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lipstyk-dogfood
          path: dogfood-reports/

  dogfood-pr:
    name: PR diff analysis
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build lipstyk
        run: cargo build --release

      - name: Diff report
        run: |
          ./target/release/lipstyk \
            --diff origin/${{ github.base_ref }} \
            --exclude-tests \
            --report \
            src/ | tee pr-report.md >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Diff threshold gate
        run: |
          ./target/release/lipstyk \
            --diff origin/${{ github.base_ref }} \
            --exclude-tests \
            --threshold 15 \
            src/

      - name: SARIF
        if: always()
        run: |
          ./target/release/lipstyk \
            --diff origin/${{ github.base_ref }} \
            --exclude-tests \
            --sarif \
            src/ > lipstyk.sarif
        continue-on-error: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: lipstyk.sarif
        continue-on-error: true
