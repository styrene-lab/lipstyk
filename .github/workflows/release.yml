name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build release artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: lipstyk-linux-x86_64
          - os: macos-13
            artifact: lipstyk-macos-x86_64
          - os: macos-14
            artifact: lipstyk-macos-arm64

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/release/lipstyk dist/${{ matrix.artifact }}/
          cp README.md LICENSE dist/${{ matrix.artifact }}/
          tar -C dist -czf dist/${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: lipstyk-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
