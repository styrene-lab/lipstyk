<!DOCTYPE html>
<html>
<head>
    <title>My App</title>
    <style>
        .container {
            width: 937px;
            margin: 0 auto;
            padding: 13px;
        }
        .wrapper {
            display: flex;
            gap: 17px;
        }
        .content {
            flex: 1;
            padding: 23px !important;
        }
        .box {
            border: 1px solid #ccc;
            padding: 11px;
            margin-bottom: 19px !important;
        }
        .item {
            padding: 7px;
            font-size: 15px;
        }
        .inner {
            margin: 3px !important;
        }
        .outer {
            padding: 29px;
        }
        .left {
            float: left !important;
            width: 327px;
        }
        .right {
            float: right !important;
            width: 513px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wrapper">
            <div class="content">
                <div class="box">
                    <div class="inner">
                        <div class="item" style="color: red; font-weight: bold;">
                            <img src="logo.png">
                            <span>Product 1</span>
                        </div>
                        <div class="item" style="color: blue; font-weight: bold;">
                            <img src="photo.jpg">
                            <span>Product 2</span>
                        </div>
                        <div class="item" style="color: green; font-weight: bold;">
                            <img src="banner.png">
                            <span>Product 3</span>
                        </div>
                    </div>
                </div>
                <div class="box">
                    <div class="inner">
                        <div class="item" style="margin: 5px;">
                            <button><img src="icon.svg"></button>
                            <button><img src="delete.svg"></button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="outer">
                <div class="left">
                    <div class="box">
                        <div class="inner">
                            <span>Sidebar content</span>
                        </div>
                    </div>
                </div>
                <div class="right">
                    <div class="box">
                        <span>More content</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
